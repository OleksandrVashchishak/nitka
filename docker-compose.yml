services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding
      POSTGRES_DB: wedding
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wedding -d wedding"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://wedding:wedding@db:5432/wedding?schema=public
      JWT_SECRET: dev-jwt-secret-change-me
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-me
      CORS_ORIGIN: http://localhost:3000
      PUBLIC_API_URL: http://localhost:3001
      # Optional Cloudinary (якщо порожньо — локальні uploads/):
      # CLOUDINARY_CLOUD_NAME:
      # CLOUDINARY_API_KEY:
      # CLOUDINARY_API_SECRET:
      # CLOUDINARY_FOLDER: nitka/vendors
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - api_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push --accept-data-loss && npm run start:dev"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # Windows bind mounts: без polling HMR часто «глухий»
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLL_INTERVAL: "1000"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    ports:
      - "3000:3000"
    volumes:
      # Без окремого volume для .next — кеш на хості, не «прилипає» в Docker
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api
    # webpack+poll стабільніший за turbopack на Win mounts; .next чистимо на старті
    command: sh -c "rm -rf .next && npm run dev:docker"

volumes:
  postgres_data:
  api_uploads:
