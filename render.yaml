# NITKA — Render Blueprint (free tier, services may sleep)
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: nitka-db
    plan: free
    databaseName: wedding
    user: wedding

services:
  - type: web
    name: nitka-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run start:prod
    healthCheckPath: /api/categories
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nitka-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://nitka-web.onrender.com
      - key: PUBLIC_API_URL
        value: https://nitka-api.onrender.com

  - type: web
    name: nitka-web
    runtime: node
    plan: free
    rootDir: apps/web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://nitka-api.onrender.com
      - key: API_URL
        value: https://nitka-api.onrender.com
