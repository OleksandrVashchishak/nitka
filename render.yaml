# NITKA — Render Blueprint (free tier, services may sleep)
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: nitka-db
    plan: free
    databaseName: wedding
    user: wedding

services:
  - type: web
    name: nitka-api
    runtime: node
    plan: free
    rootDir: apps/api
    # Без NODE_OPTIONS=460: prisma generate під 460MB зависає/OOM; nest build у репо (dist).
    buildCommand: npm install --omit=dev --no-audit --no-fund && npx prisma generate
    # Free tier не підтримує preDeployCommand — схема/міграція тільки в start.
    # Dashboard Start Command:
    #   npm run start:prod
    # Білд Nest робимо локально (dist у репо), на Render лише install + prisma generate —
    # інакше free tier OOM після clear cache.
    startCommand: npm run start:prod
    healthCheckPath: /api/categories
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nitka-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://nitka-web.onrender.com
      - key: PUBLIC_API_URL
        value: https://nitka-api.onrender.com

  - type: web
    name: nitka-web
    runtime: node
    plan: free
    rootDir: apps/web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://nitka-api.onrender.com
      - key: API_URL
        value: https://nitka-api.onrender.com
      - key: NEXT_PUBLIC_SITE_URL
        value: https://nitka-web.onrender.com
